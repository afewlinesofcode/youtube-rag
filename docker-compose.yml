services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: youtube_rag
      POSTGRES_USER: youtube
      POSTGRES_PASSWORD: youtube
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youtube -d youtube_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save '' --appendonly no

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://youtube:youtube@postgres:5432/youtube_rag
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://youtube:youtube@postgres:5432/youtube_rag
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      WATCHFILES_FORCE_POLLING: "true"
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    environment:
      VITE_BACKEND_URL: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
